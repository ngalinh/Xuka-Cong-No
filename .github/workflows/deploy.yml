name: Deploy to server

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${{ secrets.SSH_PORT }}"; PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload index.html to the bot folder
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          SSH="ssh -i $HOME/.ssh/id_deploy -p $PORT -o StrictHostKeyChecking=accept-new"

          # This app is a single static index.html served by the platform.
          # Replace ONLY that file — never touch other files in the managed folder.
          rsync -avz -e "$SSH" ./index.html "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/index.html"

          # Optional: only if you run the app as your OWN standalone PM2 process.
          # Leave PM2_APP_NAME empty for platform-served static apps (no restart needed).
          if [ -n "${PM2_APP_NAME:-}" ]; then
            $SSH "$SSH_USER@$SSH_HOST" "pm2 reload '$PM2_APP_NAME' 2>/dev/null || true"
          fi
