name: Deploy to server

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'mobile.html'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'icon.svg'
      - 'api.js'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${{ secrets.SSH_PORT }}"; PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload files to the bot folder
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          SSH="ssh -i $HOME/.ssh/id_deploy -p $PORT -o StrictHostKeyChecking=accept-new"

          # Main app files
          for f in index.html mobile.html; do
            rsync -vz --inplace --no-perms --no-owner --no-group \
              -e "$SSH" "./$f" "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/$f"
          done

          # PWA assets
          for f in manifest.webmanifest sw.js icon.svg; do
            rsync -vz --inplace --no-perms --no-owner --no-group \
              -e "$SSH" "./$f" "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/$f" \
              || echo "::warning::Skipped $f"
          done

          # API server
          rsync -vz --inplace --no-perms --no-owner --no-group \
            -e "$SSH" "./api.js" "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/api.js" \
            || echo "::warning::Skipped api.js"

          # Start / restart API with pm2
          $SSH "$SSH_USER@$SSH_HOST" "
            cd '$DEPLOY_PATH'
            if pm2 describe xuka-api > /dev/null 2>&1; then
              pm2 reload xuka-api
            else
              pm2 start api.js --name xuka-api
            fi
            pm2 save
          " || echo "::warning::pm2 step failed — start api.js manually"

          # Configure nginx proxy for /api/ → localhost:3456 (one-time setup)
          $SSH "$SSH_USER@$SSH_HOST" \
            'if grep -qr "3456\|xuka-api" /etc/nginx/ 2>/dev/null; then
               echo "nginx proxy already configured";
             else
               CONF="location /api/ { proxy_pass http://127.0.0.1:3456; proxy_http_version 1.1; }";
               echo "$CONF" | sudo tee /etc/nginx/snippets/xuka-api.conf > /dev/null &&
               sudo nginx -t && sudo systemctl reload nginx && echo "nginx reloaded OK" ||
               echo "ACTION REQUIRED: add location /api/ { proxy_pass http://127.0.0.1:3456; } to nginx ai.basso.vn server block, then reload nginx";
             fi' || echo "::warning::nginx step skipped"

          # Optional: reload existing pm2 app if configured
          if [ -n "${PM2_APP_NAME:-}" ]; then
            $SSH "$SSH_USER@$SSH_HOST" "pm2 reload '$PM2_APP_NAME' 2>/dev/null || true"
          fi
