name: Deploy to server

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'icon.svg'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${{ secrets.SSH_PORT }}"; PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload index.html to the bot folder
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          SSH="ssh -i $HOME/.ssh/id_deploy -p $PORT -o StrictHostKeyChecking=accept-new"

          # This app is a single static index.html served by the platform.
          # The bot folder is owned by root (not writable by the deploy user),
          # so we write the file content IN PLACE — this only needs the file
          # itself to be owned/writable by the deploy user, not the directory.
          # (Run once on the server: sudo chown $USER <DEPLOY_PATH>/index.html)
          rsync -vz --inplace --no-perms --no-owner --no-group \
            -e "$SSH" ./index.html "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/index.html"

          # PWA assets — upload in place too. These only succeed once the files
          # exist on the server AND are owned by the deploy user. Non-fatal so the
          # main app always deploys even before the one-time chown is done.
          # One-time on server:
          #   cd <DEPLOY_PATH> && sudo touch manifest.webmanifest sw.js icon.svg && sudo chown $USER manifest.webmanifest sw.js icon.svg index.html
          for f in manifest.webmanifest sw.js icon.svg; do
            rsync -vz --inplace --no-perms --no-owner --no-group \
              -e "$SSH" "./$f" "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/$f" \
              || echo "::warning::Skipped $f (create it on the server and chown to the deploy user to enable PWA)"
          done

          # Optional: only if you run the app as your OWN standalone PM2 process.
          # Leave PM2_APP_NAME empty for platform-served static apps (no restart needed).
          if [ -n "${PM2_APP_NAME:-}" ]; then
            $SSH "$SSH_USER@$SSH_HOST" "pm2 reload '$PM2_APP_NAME' 2>/dev/null || true"
          fi
